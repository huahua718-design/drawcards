<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cardtoon - 日期讀心術與實體圖檔</title>
    <style>
        body { 
            margin: 0; 
            background-color: #111; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; font-family: sans-serif; color: #fff; 
            touch-action: none; overflow: hidden;
            user-select: none;
        }
        
        #status-text { 
            position: absolute; top: 40px; text-align: center; 
            color: #f3c623; font-weight: bold; font-size: 20px;
            pointer-events: none; z-index: 100; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        #paintCanvas { 
            position: absolute; top: 0; left: 0; z-index: 50; cursor: crosshair; 
        }
        
        .card { 
            position: absolute; z-index: 10; 
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            transform-style: preserve-3d; cursor: pointer; 
        }
        
        .face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box;
            overflow: hidden; /* 確保圖片不超出圓角 */
            background: #fff; /* 預設白底，讓透明邊緣的圖檔更自然 */
        }
        
        /* 牌面翻轉設定 */
        .front { 
            transform: rotateY(180deg); 
            border: 1px solid #ccc;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* 讓撲克牌圖片完全填滿畫出的框框 */
            display: block;
        }

        #secret-btn { position: fixed; bottom: 0; right: 0; width: 80px; height: 80px; z-index: 999; background: transparent; }
    </style>
</head>
<body>

    <h3 id="status-text">✏️ 請在螢幕上畫出數個框框</h3>
    <canvas id="paintCanvas"></canvas>
    <div id="cards-container"></div>
    <div id="secret-btn"></div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('cards-container');
        const statusText = document.getElementById('status-text');
        
        let isDrawing = false, strokes = [], drawnRects = [];
        let cardSequence = []; 

        // ==========================================
        // 🌟 日期自動演算邏輯
        // ==========================================
        const today = new Date();
        const currentMonth = today.getMonth() + 1; // getMonth() 是從 0 開始的
        const currentDate = today.getDate();
        const remainder = currentDate % 4;

        // 決定預設的起始花色
        let defaultStartSuit = '';
        if (remainder === 1) defaultStartSuit = 'club';
        else if (remainder === 2) defaultStartSuit = 'diamond';
        else if (remainder === 3) defaultStartSuit = 'heart';
        else if (remainder === 0) defaultStartSuit = 'spade';

        // 魔術設定：起始牌花色與數字 (預設為今日演算法)
        let startSuit = defaultStartSuit;
        let startValue = currentMonth;

        // 後續的花色循環順序：愛心─黑桃─紅磚(方塊)─梅花
        const cycleOrder = ['heart', 'spade', 'diamond', 'club'];

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            ctx.strokeStyle = '#fff'; 
            ctx.lineWidth = 4; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.onresize = resize; 
        resize();

        // ==========================================
        // 🧠 核心演算法：依序推算下一張牌面
        // ==========================================
        function getNextCard(index) {
            if (index === 0) return { suit: startSuit, val: startValue };
            
            const prevCard = cardSequence[index - 1];
            
            let prevSuitIdx = cycleOrder.indexOf(prevCard.suit);
            if(prevSuitIdx === -1) prevSuitIdx = 0; 
            let nextSuit = cycleOrder[(prevSuitIdx + 1) % 4];
            
            let nextVal = prevCard.val + 5;
            if (nextVal > 13) nextVal -= 13;
            
            return { suit: nextSuit, val: nextVal };
        }

        // ==========================================
        // 🖼️ 圖片路徑轉換器
        // ==========================================
        function getImagePath(suit, val) {
            let valStr = val.toString();
            if (val === 1) valStr = '1'; 
            else if (val === 11) valStr = 'jack';
            else if (val === 12) valStr = 'queen';
            else if (val === 13) valStr = 'king';
            
            return `./cards/${suit}_${valStr}.png`;
        }

        // 🎨 觸控與長按偵測機制
        let pressTimer;
        canvas.addEventListener('pointerdown', (e) => {
            isDrawing = true; 
            strokes = []; 
            ctx.beginPath(); 
            ctx.moveTo(e.clientX, e.clientY);
            
            pressTimer = setTimeout(() => { 
                if(drawnRects.length > 0) finalizeMagic(); 
            }, 800);
        });

        canvas.addEventListener('pointermove', (e) => {
            if(!isDrawing) return;
            ctx.lineTo(e.clientX, e.clientY); 
            ctx.stroke();
            strokes.push({x: e.clientX, y: e.clientY});
            clearTimeout(pressTimer);
        });

        canvas.addEventListener('pointerup', () => {
            isDrawing = false; 
            clearTimeout(pressTimer);
            if(strokes.length > 15) {
                drawnRects.push([...strokes]);
            }
        });

        // 🔮 施展魔術：將線條化為實體圖檔的撲克牌
        function finalizeMagic() {
            canvas.style.display = 'none'; 
            statusText.innerHTML = ""; // 觸發後也可以保持乾淨，不留文字，或改成空字串
            
            drawnRects.forEach((rect, i) => {
                let xs = rect.map(p => p.x), ys = rect.map(p => p.y);
                let minX = Math.min(...xs) - 10, maxX = Math.max(...xs) + 10;
                let minY = Math.min(...ys) - 10, maxY = Math.max(...ys) + 10;
                let w = maxX - minX;
                let h = maxY - minY;
                
                let card = getNextCard(i);
                cardSequence.push(card);
                let imgPath = getImagePath(card.suit, card.val);

                let div = document.createElement('div');
                div.className = 'card';
                div.style.width = w + 'px';
                div.style.height = h + 'px';
                div.style.left = minX + 'px';
                div.style.top = minY + 'px';
                
                // 載入牌背圖檔：bicycle_blue.png 與 動態牌面
                div.innerHTML = `
                    <div class="face back">
                        <img class="card-img" src="./cards/bicycle_blue.png" alt="card back">
                    </div>
                    <div class="face front">
                        <img class="card-img" src="${imgPath}" alt="${card.suit} ${card.val}">
                    </div>
                `;
                
                div.onclick = function(e) {
                    e.stopPropagation();
                    this.style.transform = "rotateY(180deg)";
                };
                
                container.appendChild(div);
            });
        }

        // 🧙‍♂️ 魔術師秘密設定 (可臨時更改當下的起始牌)
        let lastTapTime = 0;
        document.getElementById('secret-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const currentTime = Date.now();
            if (currentTime - lastTapTime < 300 && currentTime - lastTapTime > 0) {
                let input = prompt("請輸入起始牌設定（格式如：spade 7）\n預設由日期決定的牌為：" + defaultStartSuit + " " + currentMonth, `${startSuit} ${startValue}`);
                if (input) {
                    let parts = input.split(' ');
                    const validSuits = ['spade', 'heart', 'diamond', 'club'];
                    if (parts.length === 2 && validSuits.includes(parts[0]) && !isNaN(parts[1])) {
                        startSuit = parts[0];
                        startValue = parseInt(parts[1]);
                        // 秘密提示設定成功後，還原乾淨的畫面
                        cardSequence = [];
                        drawnRects = [];
                        container.innerHTML = "";
                        canvas.style.display = 'block';
                        resize();
                        statusText.innerHTML = "✏️ 請在螢幕上畫出數個框框";
                    } else {
                        alert("格式錯誤！必須是花色與數字的組合，如：heart 10");
                    }
                }
            }
            lastTapTime = currentTime;
        });
    </script>
</body>
</html>
